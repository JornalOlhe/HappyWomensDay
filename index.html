<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQUI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6d9,#ffcce6,#ffd6f0);
overflow:hidden;
text-align:center;
color:white;
padding:20px;
}

/* PARTICULAS */

.particle{
position:fixed;
width:4px;
height:4px;
background:#ffffff88;
border-radius:50%;
animation:float 12s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* CONTAINER */

.container{
opacity:0;
transition:opacity 2s;
max-width:700px;
width:100%;
}

.container.show{
opacity:1;
}

/* TITULO */

h1{
font-size:clamp(2.2rem,7vw,4rem);
line-height:1.2;
animation:pulse 3s infinite, glow 4s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff69b4;}
to{ text-shadow:0 0 30px #ff1493;}
}

/* SUBTITULO */

.sub{
margin-top:18px;
font-size:clamp(1rem,3.8vw,1.3rem);
line-height:1.6;
opacity:0.95;
padding:0 10px;
}

/* BOTAO */

.botao{
margin-top:30px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff1493;
font-size:1rem;
cursor:pointer;
transition:0.3s;
}

.botao:hover{
transform:scale(1.1);
}

/* FLORES */

.flower{
position:fixed;
top:-10px;
font-size:12px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* CORAÇÕES */

.heart{
position:fixed;
font-size:18px;
animation:rise 2s forwards;
pointer-events:none;
}

@keyframes rise{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-100px) scale(1.6);
opacity:0;
}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container" id="mensagem">

<h1>🌸 Feliz Dia das Mulheres 🌸</h1>

<p class="sub">
Hoje é dia de celebrar mulheres incríveis.  
Fortes, inteligentes, engraçadas e que deixam o mundo muito mais bonito só por existirem. 💖  
Vocês fazem tudo ficar mais leve e especial.
</p>

<button class="botao" onclick="surpresa()">
💌
</button>

</div>

<script>

/* PARTICULAS FUNDO */

function criarParticula(){

const p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(Math.random()*10+10)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),20000)

}

setInterval(criarParticula,500)

/* FLORES CAINDO */

function criarFlor(){

const flor=document.createElement("div")

flor.className="flower"
flor.innerHTML="🌸"

flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration=(Math.random()*3+4)+"s"

document.body.appendChild(flor)

setTimeout(()=>flor.remove(),7000)

}

setInterval(criarFlor,200)

/* MOSTRAR TEXTO */

setTimeout(()=>{
document.getElementById("mensagem").classList.add("show")
},4000)

/* CLIQUE CORAÇÕES */

function criarCoracao(x,y){

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💖"

heart.style.left=x+"px"
heart.style.top=y+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

}

document.addEventListener("click",(e)=>{
for(let i=0;i<3;i++){
criarCoracao(e.clientX,e.clientY)
}
})

/* CORAÇÕES SEGUINDO O DEDO */

document.addEventListener("mousemove",(e)=>{
if(Math.random()<0.2){
criarCoracao(e.clientX,e.clientY)
}
})

/* BOTAO SURPRESA */

function surpresa(){

/* explosão flores */

for(let i=0;i<30;i++){

const flor=document.createElement("div")

flor.className="flower"
flor.innerHTML="🌸"

flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration="3s"

document.body.appendChild(flor)

setTimeout(()=>flor.remove(),4000)

}

/* chuva corações */

for(let i=0;i<30;i++){

setTimeout(()=>{

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"
heart.style.top=Math.random()*40+"vh"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

},i*120)

}

}

</script>

</body>
</html>
